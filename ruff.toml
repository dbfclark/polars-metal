target-version = "py310"
line-length = 100
src = ["python", "tests"]
exclude = ["vendor"]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # bugbear
    "SIM", # simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501",  # line length (formatter handles it)
]

[format]
quote-style = "double"
indent-style = "space"
